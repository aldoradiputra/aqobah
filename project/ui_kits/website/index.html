<!-- @dsCard group="Website" viewport="1280x760" name="Aqobah Marketing Website" subtitle="Hero, packages, booking — interactive click-through" -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aqobah Travel — Haji & Umroh</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--surface-card); }
  #root { min-height:100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="HajiKhususScreen.jsx"></script>
<script type="text/babel" src="LayananScreen.jsx"></script>
<script type="text/babel" src="PackageDetail.jsx"></script>
<script type="text/babel">
  function App() {
    const [screen, setScreen] = React.useState('home');
    const [pkg, setPkg] = React.useState(null);
    const nav = (k) => { window.scrollTo(0,0); setScreen(k==='packages'?'home':k); };
    const selectPkg = (p) => { window.scrollTo(0,0); setPkg(p); setScreen('detail'); };
    const active = screen==='detail' ? 'packages' : screen;
    let body;
    if (screen==='detail') body = <window.PackageDetail pkg={pkg} onNav={nav} />;
    else if (screen==='hajj') body = <window.HajiKhususScreen onNav={nav} />;
    else if (screen==='layanan' || screen==='contact') body = <window.LayananScreen onNav={nav} />;
    else body = <window.HomeScreen onNav={nav} onSelectPackage={selectPkg} />;
    return (
      <div>
        <window.SiteHeader onNav={nav} active={active} />
        {body}
        <window.SiteFooter onNav={nav} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
