<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-page); padding: 26px; color: var(--text-primary); }
  .cap { font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { PricingTier, FacilityItem } = window.AqobahDesignSystem_6897ec;
  const Ico = ({ name, size=22 }) => {
    const ref = React.useRef(null);
    React.useEffect(() => { if (ref.current && lucide[name]) { ref.current.innerHTML=''; ref.current.appendChild(lucide.createElement(lucide[name])); const s=ref.current.querySelector('svg'); if(s){s.setAttribute('width',size);s.setAttribute('height',size);} } });
    return <span ref={ref} style={{display:'flex'}} />;
  };
  function Demo() {
    return (
      <div>
        <div className="cap">Pricing Tiers · Haji Khusus VIP</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'18px', maxWidth:560, marginBottom:'30px' }}>
          <PricingTier price="270" usd="USD 15.500" occupancy="QUAD" />
          <PricingTier price="288" usd="USD 16.500" occupancy="TRIPLE" featured />
          <PricingTier price="306" usd="USD 17.500" occupancy="DOUBLE" />
        </div>
        <div className="cap">Facilities</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'20px', maxWidth:680 }}>
          <FacilityItem icon={<Ico name="BedDouble" />} title="Hotel ⭐5" description="Penginapan nyaman dekat Masjidil Haram." />
          <FacilityItem icon={<Ico name="UserCheck" />} title="Muthawif" description="Pendamping berpengalaman sesuai sunnah." />
          <FacilityItem icon={<Ico name="Crown" />} title="Maktab VIP" description="Layanan eksklusif dengan fasilitas premium." />
          <FacilityItem icon={<Ico name="Stethoscope" />} title="Dokter Pribadi" description="Layanan kesehatan siap mendampingi jamaah." />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
