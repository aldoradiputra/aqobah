<!-- @dsCard group="Colors" viewport="700x150" name="Status Colors" subtitle="Success, warning, danger, info — soft + solid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-card); padding: 22px; color:var(--text-primary); }
  .row { display:flex; gap:14px; }
  .item { flex:1; border-radius: var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .solid { height:54px; }
  .soft { height:30px; display:flex; align-items:center; padding-left:10px; font-size:11px; font-weight:600; }
  .cap { padding:7px 10px; font-size:11px; font-weight:600; }
  .hex { font-weight:400; color:var(--text-muted); font-size:10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="solid" style="background:var(--success-500)"></div>
      <div class="soft" style="background:var(--success-50)">Aa</div>
      <div class="cap">Success <span class="hex">#1E9E6A</span></div>
    </div>
    <div class="item">
      <div class="solid" style="background:var(--warning-500)"></div>
      <div class="soft" style="background:var(--warning-50)">Aa</div>
      <div class="cap">Warning <span class="hex">#D98A0B</span></div>
    </div>
    <div class="item">
      <div class="solid" style="background:var(--danger-500)"></div>
      <div class="soft" style="background:var(--danger-50)">Aa</div>
      <div class="cap">Danger <span class="hex">#C0392B</span></div>
    </div>
    <div class="item">
      <div class="solid" style="background:var(--info-500)"></div>
      <div class="soft" style="background:var(--info-50)">Aa</div>
      <div class="cap">Info <span class="hex">#0593D5</span></div>
    </div>
  </div>
</body>
</html>
