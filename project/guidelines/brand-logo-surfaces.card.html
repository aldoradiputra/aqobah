<!-- @dsCard group="Brand" viewport="700x230" name="Logo on Brand Surfaces" subtitle="Globe mark on indigo and blue fields" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); padding: 24px; display:flex; gap:18px; background:var(--surface-card); }
  .field { flex:1; height:150px; border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:center; gap:14px; padding:0 18px; }
  .field img { height:96px; }
  .deep { background:var(--surface-deep); }
  .blue { background:var(--brand-primary); }
  .paper { background:var(--surface-page); border:1px solid var(--border-subtle); }
  .wordmark { font-family:var(--font-display); color:#fff; font-size:1.9rem; letter-spacing:0.02em; }
</style>
</head>
<body>
  <div class="field deep"><img src="../assets/mark-globe.png" alt="globe mark"><span class="wordmark">AQOBAH</span></div>
  <div class="field blue"><img src="../assets/mark-globe.png" alt="globe mark"><span class="wordmark">AQOBAH</span></div>
  <div class="field paper"><img src="../assets/mark-globe.png" alt="globe mark"><span class="wordmark" style="color:var(--brand-primary)">AQOBAH</span></div>
</body>
</html>
