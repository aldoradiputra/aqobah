<!-- @dsCard group="Type" viewport="700x210" name="Type Scale" subtitle="Major-third ramp, 11 → 76px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-card); padding: 22px 28px; color:var(--text-primary); }
  .row { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border-subtle); padding:6px 0; }
  .row:last-child { border-bottom:0; }
  .spec { font-family: var(--font-display); color:var(--text-primary); white-space:nowrap; }
  .tok { margin-left:auto; font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row"><span class="spec" style="font-size:var(--text-4xl)">Hero</span><span class="tok">--text-4xl · 60px</span></div>
  <div class="row"><span class="spec" style="font-size:var(--text-2xl)">Section title</span><span class="tok">--text-2xl · 36px</span></div>
  <div class="row"><span class="spec" style="font-size:var(--text-xl)">Subhead</span><span class="tok">--text-xl · 28px</span></div>
  <div class="row"><span class="spec" style="font-size:var(--text-md); font-family:var(--font-body)">Lead body paragraph</span><span class="tok">--text-md · 18px</span></div>
  <div class="row"><span class="spec" style="font-size:var(--text-sm); font-family:var(--font-ui)">UI / meta label</span><span class="tok">--text-sm · 14px</span></div>
</body>
</html>
