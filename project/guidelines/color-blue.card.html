<!-- @dsCard group="Colors" viewport="700x150" name="Aqobah Blue Scale" subtitle="50 → 900 primary ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-card); padding: 22px; color:var(--text-primary); }
  .ramp { display:flex; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .step { flex:1; height:96px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; font-size:10px; font-weight:600; }
  .lbl { margin-top:10px; font-size:11px; color:var(--text-muted); text-align:center; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--blue-50)">50</div>
    <div class="step" style="background:var(--blue-100)">100</div>
    <div class="step" style="background:var(--blue-200)">200</div>
    <div class="step" style="background:var(--blue-300)">300</div>
    <div class="step" style="background:var(--blue-400);color:#fff">400</div>
    <div class="step" style="background:var(--blue-500);color:#fff">500</div>
    <div class="step" style="background:var(--blue-600);color:#fff">600</div>
    <div class="step" style="background:var(--blue-700);color:#fff">700</div>
    <div class="step" style="background:var(--blue-800);color:#fff">800</div>
    <div class="step" style="background:var(--blue-900);color:#fff">900</div>
  </div>
  <div class="lbl">--blue-50 through --blue-900 · 500 is the core brand value</div>
</body>
</html>
