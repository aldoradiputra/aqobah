<!-- @dsCard group="Type" viewport="700x230" name="UI — IBM Plex Sans" subtitle="Buttons, labels, eyebrows, data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-card); padding: 26px 28px; color:var(--text-primary); }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .eyebrow { font-size: var(--text-xs); font-weight:600; letter-spacing: var(--tracking-eyebrow); text-transform:uppercase; color:var(--brand-primary); }
  .label { font-size: var(--text-base); font-weight:600; }
  .data { font-size: var(--text-lg); font-weight:700; font-variant-numeric: tabular-nums; }
  .small { font-size: var(--text-sm); color:var(--text-secondary); }
  .meta { font-size:11px; color:var(--text-muted); margin-top:14px; letter-spacing:var(--tracking-wide); }
</style>
</head>
<body>
  <div class="stack">
    <div class="eyebrow">Penyelenggara Resmi · PIHK 610</div>
    <div class="label">Daftar Paket Umroh</div>
    <div class="data">Rp 28.900.000 · 4.8 / 5.0</div>
    <div class="small">16 tahun pengalaman · 40 mitra di seluruh Indonesia</div>
  </div>
  <div class="meta">IBM Plex Sans · 400–700 · --font-ui · UI, eyebrows (0.18em tracking), tabular data</div>
</body>
</html>
