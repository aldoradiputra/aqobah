<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="8px base rhythm, 4 → 112px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-ui); background: var(--surface-card); padding: 24px 28px; color:var(--text-primary); }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--blue-200); border-radius: var(--radius-xs); }
  .tok { font-size:10px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="tok">2 · 8</div></div>
    <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="tok">3 · 12</div></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="tok">4 · 16</div></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="tok">5 · 24</div></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="tok">6 · 32</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="tok">8 · 48</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="tok">9 · 64</div></div>
    <div class="item"><div class="box" style="width:80px;height:80px"></div><div class="tok">10 · 80</div></div>
  </div>
</body>
</html>
