<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aqobah ERP Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Blue palette */
  --blue-50:  #E7F5FC; --blue-100: #C5E8F8; --blue-200: #8FD2F0;
  --blue-300: #4FB8E8; --blue-400: #1BA1DD; --blue-500: #0593D5;
  --blue-600: #0479B0; --blue-700: #045F8A; --blue-800: #064A6C; --blue-900: #073B56;
  /* Indigo palette */
  --indigo-300: #6E86C0; --indigo-400: #4660A0; --indigo-500: #2C4A8E;
  --indigo-600: #233C75; --indigo-700: #1B2E5A; --indigo-800: #142242;
  /* Gold palette */
  --gold-50: #FEF6E4; --gold-100: #FCE9BC; --gold-200: #FAD683;
  --gold-300: #FCB017; --gold-400: #E89C00; --gold-500: #C98400; --gold-600: #A06800;
  /* Maroon palette */
  --maroon-100: #F3DCDD; --maroon-300: #C76A6D; --maroon-500: #A82C30;
  --maroon-600: #8E2125; --maroon-700: #6E181C;
  /* Neutrals */
  --neutral-0: #FFFFFF; --neutral-25: #FBFCFE; --neutral-50: #F4F7FA;
  --neutral-100: #EAEFF4; --neutral-200: #D8E0E8; --neutral-300: #BDC8D3;
  --neutral-400: #95A3B2; --neutral-500: #6B7A8B; --neutral-600: #4D5C6C;
  --neutral-700: #364555; --neutral-800: #22303F; --neutral-900: #0F1D2B;
  /* Status */
  --success-500: #1E9E6A; --success-50: #E4F5EE;
  --warning-500: #D98A0B; --warning-50: #FBF0DC;
  --danger-500: #C0392B; --danger-50: #F8E5E2;
  /* Semantic */
  --brand-primary: var(--blue-500);
  --brand-primary-hover: var(--blue-600);
  --brand-deep: var(--indigo-500);
  --brand-accent: var(--gold-300);
  --brand-seal: var(--maroon-500);
  --text-primary: var(--neutral-900);
  --text-secondary: var(--neutral-600);
  --text-muted: var(--neutral-500);
  --text-on-brand: var(--neutral-0);
  --surface-page: var(--neutral-50);
  --surface-card: var(--neutral-0);
  --surface-sunken: var(--neutral-100);
  --surface-deep: var(--indigo-700);
  --surface-brand-soft: var(--blue-50);
  --border-subtle: var(--neutral-200);
  --border-default: var(--neutral-300);
  --shadow-xs: 0 1px 2px rgba(15,29,43,0.06);
  --shadow-sm: 0 2px 6px rgba(15,29,43,0.07);
  --shadow-md: 0 8px 20px -6px rgba(15,29,43,0.12);
  --radius-xs: 4px; --radius-sm: 8px; --radius-md: 12px;
  --radius-lg: 18px; --radius-xl: 26px; --radius-pill: 999px;
  --font-display: 'Aref Ruqaa', 'Lora', Georgia, serif;
  --font-body: 'Lora', Georgia, serif;
  --font-ui: 'IBM Plex Sans', system-ui, sans-serif;
  --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
  --text-md: 1.125rem; --text-lg: 1.375rem;
  --dur-fast: 140ms; --dur-base: 240ms;
  --ease-out: cubic-bezier(0.22,1,0.36,1);
}

html, body { height: 100%; }
body {
  background: var(--surface-page);
  font-family: var(--font-ui);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

#root { height: 100%; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--neutral-400); }

button { font-family: var(--font-ui); }
button:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 2px; }

.nav-btn {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
  text-align: left; width: 100%; font-family: var(--font-ui);
  font-size: 0.875rem; transition: background var(--dur-fast) var(--ease-out),
  color var(--dur-fast) var(--ease-out);
}
.nav-btn:hover:not(.nav-btn--active) {
  background: rgba(255,255,255,0.07);
  color: #fff;
}
.nav-btn--active {
  background: rgba(255,255,255,0.13);
  color: #fff; font-weight: 600;
  border-left: 3px solid var(--gold-300);
}
.nav-btn--inactive {
  background: transparent; color: rgba(255,255,255,0.72);
  font-weight: 500; border-left: 3px solid transparent;
}

.kpi-card {
  background: var(--surface-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-xs);
  transition: box-shadow var(--dur-base) var(--ease-out),
  transform var(--dur-base) var(--ease-out);
}
.kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; padding: 12px 18px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted);
  white-space: nowrap; background: var(--surface-sunken);
}
.data-table td {
  padding: 13px 18px; color: var(--text-primary);
  border-top: 1px solid var(--border-subtle); vertical-align: middle;
}
.data-table tbody tr { transition: background var(--dur-fast); }
.data-table tbody tr:hover { background: var(--surface-sunken); }

.pill {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 600; white-space: nowrap; line-height: 1.5;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-ui); font-weight: 600; font-size: 13px;
  padding: 10px 16px; border-radius: var(--radius-pill); border: none;
  background: var(--brand-primary); color: #fff; cursor: pointer;
  transition: background var(--dur-fast) var(--ease-out),
  box-shadow var(--dur-fast) var(--ease-out);
  white-space: nowrap;
}
.btn-primary:hover { background: var(--blue-600); box-shadow: 0 4px 14px rgba(5,147,213,0.4); }
.btn-primary:active { background: var(--blue-700); transform: scale(0.98); }

.btn-ghost {
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-default); background: var(--surface-card);
  color: var(--text-secondary); cursor: pointer;
  transition: background var(--dur-fast), border-color var(--dur-fast);
}
.btn-ghost:hover { background: var(--surface-sunken); border-color: var(--border-default); }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-sunken); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-pill); padding: 8px 14px; width: 240px;
  cursor: text; transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.search-bar:hover { border-color: var(--border-default); }
.search-bar input {
  border: none; background: transparent; outline: none;
  font-family: var(--font-ui); font-size: 13px; color: var(--text-primary);
  width: 100%; caret-color: var(--brand-primary);
}
.search-bar input::placeholder { color: var(--text-muted); }

.panel {
  background: var(--surface-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
}
.panel-title {
  font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; margin: 0;
}
.panel-body { padding: 20px; }

.progress-bar {
  height: 8px; border-radius: var(--radius-pill);
  background: var(--surface-sunken); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: var(--radius-pill);
  transition: width 0.6s var(--ease-out);
}

.avatar {
  border-radius: 50%; display: inline-flex; align-items: center;
  justify-content: center; font-weight: 700; flex-shrink: 0;
  font-family: var(--font-ui);
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════════════════════════════
   SUPABASE CONFIG
   Fill in after running supabase/migrations/001_create_products.sql
   ══════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://asztgumnilpjdxpizkzn.supabase.co';       // e.g. https://xyzxyz.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_eSriyphjQxKP3rNxNwmpOg_w5K1R_1j';  // your project's anon public key

async function sb(path, opts = {}) {
  if (!SUPABASE_URL) return null;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: opts.method === 'POST' ? 'return=representation' : undefined,
      ...opts.headers,
    },
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ─── Lucide Icon Wrapper ───────────────────────────────────────────────────
function Icon({ name, size = 18, color, strokeWidth = 1.8, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide || !lucide[name]) return;
    ref.current.innerHTML = '';
    const el = lucide.createElement(lucide[name]);
    ref.current.appendChild(el);
    const svg = ref.current.querySelector('svg');
    if (svg) {
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('stroke-width', strokeWidth);
      if (color) svg.setAttribute('stroke', color);
    }
  });
  return <span ref={ref} style={{ display: 'flex', flexShrink: 0, ...style }} />;
}

// ─── Pill Badge ────────────────────────────────────────────────────────────
const PILL_TONES = {
  neutral: { bg: '#EAEFF4', fg: '#364555' },
  blue:    { bg: '#E7F5FC', fg: '#0479B0' },
  gold:    { bg: '#FEF6E4', fg: '#A06800' },
  green:   { bg: '#E4F5EE', fg: '#1E9E6A' },
  amber:   { bg: '#FBF0DC', fg: '#D98A0B' },
  red:     { bg: '#F8E5E2', fg: '#C0392B' },
  seal:    { bg: '#F3DCDD', fg: '#8E2125' },
};
function Pill({ children, tone = 'neutral' }) {
  const { bg, fg } = PILL_TONES[tone] || PILL_TONES.neutral;
  return (
    <span className="pill" style={{ background: bg, color: fg }}>
      {children}
    </span>
  );
}

// ─── KPI Card ──────────────────────────────────────────────────────────────
function Kpi({ icon, label, value, delta, deltaUp = true, accent = 'var(--brand-primary)' }) {
  return (
    <div className="kpi-card">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <span style={{
          width: 38, height: 38, borderRadius: 'var(--radius-sm)', flexShrink: 0,
          background: `color-mix(in srgb, ${accent} 12%, white)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name={icon} size={19} color={accent} />
        </span>
        {delta && (
          <span style={{
            fontSize: 12, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 2,
            color: deltaUp ? 'var(--success-500)' : 'var(--danger-500)',
          }}>
            {deltaUp ? '▲' : '▼'} {delta}
          </span>
        )}
      </div>
      <div style={{
        fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.65rem',
        lineHeight: 1.1, color: 'var(--text-primary)', fontVariantNumeric: 'tabular-nums',
        whiteSpace: 'nowrap',
      }}>{value}</div>
      <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 5 }}>{label}</div>
    </div>
  );
}

// ─── Data Table ────────────────────────────────────────────────────────────
function DataTable({ columns, rows, onRowClick }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table className="data-table">
        <thead>
          <tr>
            {columns.map(c => (
              <th key={c.key} style={{ textAlign: c.align || 'left' }}>{c.label}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i} onClick={() => onRowClick?.(r)} style={{ cursor: onRowClick ? 'pointer' : 'default' }}>
              {columns.map(c => (
                <td key={c.key} style={{ textAlign: c.align || 'left', whiteSpace: c.wrap ? 'normal' : 'nowrap' }}>
                  {c.render ? c.render(r) : r[c.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── Panel ─────────────────────────────────────────────────────────────────
function Panel({ title, action, children, noPad = false, style }) {
  return (
    <div className="panel" style={style}>
      <div className="panel-header">
        <h3 className="panel-title">{title}</h3>
        {action}
      </div>
      {!noPad && <div className="panel-body">{children}</div>}
      {noPad && children}
    </div>
  );
}

// ─── Progress Bar ──────────────────────────────────────────────────────────
function Progress({ value, max, color }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  const fill = pct > 85 ? 'var(--danger-500)' : pct > 60 ? 'var(--warning-500)' : 'var(--success-500)';
  return (
    <div className="progress-bar">
      <div className="progress-fill" style={{ width: pct + '%', background: color || fill }} />
    </div>
  );
}

// ─── Stat mini (used in detail panels) ────────────────────────────────────
function Stat({ label, value, tone }) {
  return (
    <div style={{ textAlign: 'center' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.4rem', color: 'var(--text-primary)' }}>{value}</div>
      <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{label}</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// NAV CONFIG
// ══════════════════════════════════════════════════════════════════════════════
const ERP_NAV = [
  { key: 'dashboard', label: 'Dashboard',    icon: 'LayoutDashboard' },
  { key: 'crm',       label: 'CRM',          icon: 'Users' },
  { key: 'sales',     label: 'Sales Order',  icon: 'ShoppingCart' },
  { key: 'products',  label: 'Produk',       icon: 'Package' },
  { key: 'ops',       label: 'Operasional',  icon: 'ClipboardCheck' },
  { key: 'finance',   label: 'Keuangan',     icon: 'Wallet' },
  { key: 'hr',        label: 'SDM / HR',     icon: 'UserCog' },
];

const MODULE_META = {
  dashboard: { title: 'Dashboard',    subtitle: 'Ringkasan operasional · semua unit bisnis' },
  crm:       { title: 'CRM',          subtitle: 'Pipeline jamaah & klien korporat' },
  sales:     { title: 'Sales Order',  subtitle: 'Pesanan paket & pembayaran' },
  products:  { title: 'Produk',       subtitle: 'Manajemen paket & kuota' },
  ops:       { title: 'Operasional',  subtitle: 'Dokumen, manasik & vendor' },
  finance:   { title: 'Keuangan',     subtitle: 'Akuntansi & arus kas' },
  hr:        { title: 'SDM / HR',     subtitle: 'Karyawan & tim lapangan' },
};

// ══════════════════════════════════════════════════════════════════════════════
// SHELL
// ══════════════════════════════════════════════════════════════════════════════
function ErpShell({ active, onNav, children }) {
  const [notifOpen, setNotifOpen] = useState(false);
  const meta = MODULE_META[active];

  const ACTION_LABELS = {
    dashboard: null,
    crm:       '+ Tambah Lead',
    sales:     '+ Order Baru',
    products:  '+ Paket Baru',
    ops:       '+ Dokumen',
    finance:   '+ Transaksi',
    hr:        '+ Karyawan',
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--surface-page)' }}>

      {/* ── SIDEBAR ─────────────────────────────────────── */}
      <aside style={{
        width: 248, flexShrink: 0, background: 'var(--surface-deep)', color: '#fff',
        display: 'flex', flexDirection: 'column', height: '100vh', overflowY: 'auto',
      }}>
        {/* Logo */}
        <div style={{
          padding: '20px 22px', display: 'flex', alignItems: 'center', gap: 10,
          borderBottom: '1px solid rgba(255,255,255,0.1)', flexShrink: 0,
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: '50%', overflow: 'hidden',
            background: 'var(--indigo-800)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>
            <svg viewBox="0 0 36 36" width="36" height="36">
              <circle cx="18" cy="18" r="18" fill="#142242"/>
              <ellipse cx="18" cy="18" rx="8" ry="14" fill="none" stroke="#0593D5" strokeWidth="1.4"/>
              <ellipse cx="18" cy="18" rx="14" ry="8" fill="none" stroke="#0593D5" strokeWidth="1.4"/>
              <circle cx="18" cy="18" r="14" fill="none" stroke="#0593D5" strokeWidth="1.4"/>
              <circle cx="18" cy="18" r="3" fill="#FCB017"/>
            </svg>
          </div>
          <div>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.15rem', lineHeight: 1, letterSpacing: '0.02em' }}>AQOBAH</div>
            <div style={{ fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--gold-300)', marginTop: 2 }}>ERP Console</div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{ padding: '14px 12px', display: 'flex', flexDirection: 'column', gap: 2, flex: 1 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.35)', padding: '6px 6px 8px' }}>Menu Utama</div>
          {ERP_NAV.map(({ key, label, icon }) => (
            <button
              key={key}
              onClick={() => onNav(key)}
              className={`nav-btn ${active === key ? 'nav-btn--active' : 'nav-btn--inactive'}`}
            >
              <Icon name={icon} size={17} color={active === key ? '#FCB017' : 'rgba(255,255,255,0.65)'} />
              <span>{label}</span>
              {key === 'crm' && (
                <span style={{ marginLeft: 'auto', background: 'var(--maroon-500)', color: '#fff', fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 'var(--radius-pill)' }}>17</span>
              )}
            </button>
          ))}
        </nav>

        {/* Unit selector */}
        <div style={{ padding: '12px', borderTop: '1px solid rgba(255,255,255,0.08)', flexShrink: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.35)', marginBottom: 8, paddingLeft: 4 }}>Unit Bisnis</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
            {['Umrah', 'Haji', 'Halal', 'B2B'].map(u => (
              <span key={u} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 'var(--radius-pill)', background: 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.7)', fontWeight: 500, cursor: 'pointer' }}>{u}</span>
            ))}
          </div>
        </div>

        {/* User */}
        <div style={{
          padding: '14px 16px', borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex',
          alignItems: 'center', gap: 10, flexShrink: 0,
        }}>
          <div className="avatar" style={{ width: 34, height: 34, background: 'var(--gold-300)', color: 'var(--indigo-800)', fontSize: 13 }}>AD</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>Admin Pusat</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)', marginTop: 1 }}>Kantor Pusat · Tangsel</div>
          </div>
          <button style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4 }}>
            <Icon name="LogOut" size={15} color="rgba(255,255,255,0.45)" />
          </button>
        </div>
      </aside>

      {/* ── MAIN ────────────────────────────────────────── */}
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>

        {/* Topbar */}
        <header style={{
          height: 68, flexShrink: 0, background: 'var(--surface-card)',
          borderBottom: '1px solid var(--border-subtle)',
          display: 'flex', alignItems: 'center', gap: 16, padding: '0 28px',
          position: 'relative', zIndex: 10, boxShadow: 'var(--shadow-xs)',
        }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.35rem', margin: 0, lineHeight: 1.15 }}>{meta.title}</h1>

function ErpProducts() {
  const [products, setProducts] = useState(PRODUCT_SEED);
  const [loading, setLoading] = useState(!!SUPABASE_URL);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (msg, ok = true) => { setToast({ msg, ok }); setTimeout(() => setToast(null), 3200); };

  const loadProducts = useCallback(() => {
    return sb('products?select=*&order=sort_order.asc,created_at.asc')
      .then(rows => {
        if (rows && rows.length) setProducts(rows.map(r => ({ ...r, price: r.price_display, tone: r.tone || 'blue' })));
      });
  }, []);

  useEffect(() => {
    if (!SUPABASE_URL) return;
    loadProducts()
      .catch(() => showToast('Gagal memuat dari Supabase', false))
      .finally(() => setLoading(false));
  }, [loadProducts]);

  const saveProduct = async (form) => {
    const isEdit = !!(form.id && !String(form.id).startsWith('local-'));
    const payload = {
      name: form.name, unit: form.unit,
      price_display: form.price_display || '',
      duration: form.duration || '', departure: form.departure || 'Jakarta',
      cap: +form.cap || 20, sold: +form.sold || 0,
      tone: TONE_MAP[form.unit] || 'blue',
      image_key: form.image_key || 'kaaba',
      badge_label: form.badge_label || '',
      badge_variant: TONE_MAP[form.unit]==='seal'?'seal':TONE_MAP[form.unit]==='gold'?'accent':'brand',
      is_published: form.is_published ?? true,
    };
    if (SUPABASE_URL) {
      try {
        if (isEdit) {
          await sb(`products?id=eq.${form.id}`, { method:'PATCH', body:JSON.stringify(payload) });
        } else {
          await sb('products', { method:'POST', body:JSON.stringify(payload) });
        }
        await loadProducts();
        showToast(isEdit ? 'Paket diperbarui ✓' : 'Paket ditambahkan — website akan diperbarui otomatis ✓');
      } catch { showToast('Gagal menyimpan ke Supabase', false); }
    } else {
      if (isEdit) {
        setProducts(ps => ps.map(p => p.id===form.id ? { ...p, ...payload, price:payload.price_display } : p));
      } else {
        setProducts(ps => [...ps, { ...payload, id:`local-${Date.now()}`, price:payload.price_display }]);
      }
      showToast(isEdit ? 'Paket diperbarui (lokal)' : 'Paket ditambahkan (lokal) — sambungkan Supabase untuk sinkronisasi');
    }
    setModal(null);
  };

  const deleteProduct = async (id) => {
    if (!confirm('Hapus paket ini dari katalog?')) return;
    if (SUPABASE_URL && !String(id).startsWith('local-')) {
      try {
        await sb(`products?id=eq.${id}`, { method:'DELETE' });
        showToast('Paket dihapus dari katalog & website ✓');
      } catch { showToast('Gagal menghapus', false); return; }
    } else {
      showToast('Paket dihapus (lokal)');
    }
    setProducts(ps => ps.filter(p => p.id !== id));
  };

  const totalSold = products.reduce((s, p) => s + (+p.sold||0), 0);
  const totalCap  = products.reduce((s, p) => s + (+p.cap||0), 0);
  const fillRate  = totalCap ? Math.round(totalSold / totalCap * 100) : 0;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:22 }}>
      {/* Toast notification */}
      {toast && (
        <div style={{ position:'fixed', top:80, right:24, zIndex:800, background:toast.ok?'var(--success-500)':'var(--danger-500)', color:'#fff', padding:'11px 20px', borderRadius:'var(--radius-pill)', fontFamily:'var(--font-ui)', fontSize:13, fontWeight:600, boxShadow:'var(--shadow-lg)', transition:'all 0.2s' }}>{toast.msg}</div>
      )}

      {/* KPIs */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:18 }}>
        <Kpi icon="Package"     label="Total paket aktif"  value={String(products.length)} accent="var(--brand-primary)" />
        <Kpi icon="Users"       label="Total kuota"        value={String(totalCap)}        accent="var(--indigo-500)" />
        <Kpi icon="TicketCheck" label="Terisi"             value={String(totalSold)}       accent="var(--success-500)" />
        <Kpi icon="Percent"     label="Fill rate"          value={`${fillRate}%`}          accent="var(--gold-400)" />
      </div>

      {/* Header row */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.15rem', margin:0 }}>Katalog Paket</h2>
          <div style={{ fontSize:12, marginTop:2 }}>
            {SUPABASE_URL
              ? <span style={{ color:'var(--success-500)', fontWeight:600 }}>● Terhubung ke Supabase — perubahan langsung tampil di aqobah.com</span>
              : <span style={{ color:'var(--text-muted)' }}>Data lokal · isi SUPABASE_URL untuk sinkronisasi ke website</span>
            }
          </div>
        </div>
        <button className="btn-primary" onClick={()=>setModal('add')}>+ Paket Baru</button>
      </div>

      {/* Product grid */}
      {loading ? (
        <div style={{ textAlign:'center', padding:48, color:'var(--text-muted)', fontFamily:'var(--font-ui)' }}>Memuat paket dari Supabase…</div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18 }}>
          {products.map(p => {
            const pct = Math.round((+p.sold||0) / (+p.cap||1) * 100);
            return (
              <div key={p.id||p.name} style={{ background:'var(--surface-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', padding:20, boxShadow:'var(--shadow-xs)', display:'flex', flexDirection:'column', gap:14, transition:'box-shadow var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out)' }}
                onMouseEnter={e=>{ e.currentTarget.style.boxShadow='var(--shadow-md)'; e.currentTarget.style.transform='translateY(-2px)'; }}
                onMouseLeave={e=>{ e.currentTarget.style.boxShadow='var(--shadow-xs)'; e.currentTarget.style.transform='none'; }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10 }}>
                  <h3 style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.05rem', margin:0, lineHeight:1.25 }}>{p.name}</h3>
                  <Pill tone={p.tone||'blue'}>{p.unit}</Pill>
                </div>
                <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.25rem', color:'var(--brand-seal)' }}>{p.price||p.price_display}</div>
                <div>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'var(--text-muted)', marginBottom:5 }}>
                    <span>Kursi terisi</span>
                    <span style={{ fontWeight:600, color:pct>85?'var(--danger-500)':'var(--text-secondary)' }}>{p.sold||0}/{p.cap||0} ({pct}%)</span>
                  </div>
                  <Progress value={+p.sold||0} max={+p.cap||1} />
                </div>
                {p.is_published===false && (
                  <div style={{ fontSize:11, color:'var(--warning-500)', fontWeight:600, background:'var(--warning-50)', padding:'4px 10px', borderRadius:'var(--radius-pill)', alignSelf:'flex-start' }}>Tersembunyi dari website</div>
                )}
                <div style={{ display:'flex', gap:8 }}>
                  <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setModal(p)}>Edit</button>
                  <button className="btn-primary" style={{ flex:1, justifyContent:'center', borderRadius:'var(--radius-sm)', background:'var(--danger-500)' }} onClick={()=>deleteProduct(p.id)}>Hapus</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Modal */}
      {modal && <ProductModal product={modal==='add'?null:modal} onSave={saveProduct} onClose={()=>setModal(null)} />}
    </div>
  );
}

    <ErpShell active={screen} onNav={nav}>

  );
}
