<!DOCTYPE html>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Blue */
  --blue-50:#E7F5FC; --blue-100:#C5E8F8; --blue-200:#8FD2F0;
  --blue-300:#4FB8E8; --blue-400:#1BA1DD; --blue-500:#0593D5;
  --blue-600:#0479B0; --blue-700:#045F8A; --blue-800:#064A6C; --blue-900:#073B56;
  /* Indigo */
  --indigo-300:#6E86C0; --indigo-400:#4660A0; --indigo-500:#2C4A8E;
  --indigo-600:#233C75; --indigo-700:#1B2E5A; --indigo-800:#142242;
  /* Gold */
  --gold-50:#FEF6E4; --gold-100:#FCE9BC; --gold-200:#FAD683;
  --gold-300:#FCB017; --gold-400:#E89C00; --gold-500:#C98400; --gold-600:#A06800;
  /* Maroon */
  --maroon-100:#F3DCDD; --maroon-300:#C76A6D; --maroon-500:#A82C30;
  --maroon-600:#8E2125; --maroon-700:#6E181C;
  /* Neutrals */
  --neutral-0:#FFFFFF; --neutral-25:#FBFCFE; --neutral-50:#F4F7FA;
  --neutral-100:#EAEFF4; --neutral-200:#D8E0E8; --neutral-300:#BDC8D3;
  --neutral-400:#95A3B2; --neutral-500:#6B7A8B; --neutral-600:#4D5C6C;
  --neutral-700:#364555; --neutral-800:#22303F; --neutral-900:#0F1D2B;
  /* Status */
  --success-50:#E4F5EE; --success-500:#1E9E6A;
  --warning-50:#FBF0DC; --warning-500:#D98A0B;
  --danger-50:#F8E5E2; --danger-500:#C0392B;
  /* Semantic */
  --brand-primary:var(--blue-500);
  --brand-deep:var(--indigo-500);
  --brand-accent:var(--gold-300);
  --brand-seal:var(--maroon-500);
  --text-primary:var(--neutral-900);
  --text-secondary:var(--neutral-600);
  --text-muted:var(--neutral-500);
  --surface-page:var(--neutral-25);
  --surface-card:var(--neutral-0);
  --surface-sunken:var(--neutral-100);
  --surface-deep:var(--indigo-700);
  --surface-brand-soft:var(--blue-50);
  --surface-accent-soft:var(--gold-50);
  --border-subtle:var(--neutral-200);
  --border-default:var(--neutral-300);
  /* Typography */
  --font-display:'Aref Ruqaa','Lora',Georgia,serif;
  --font-body:'Lora',Georgia,serif;
  --font-ui:'IBM Plex Sans',system-ui,sans-serif;
  --text-xs:0.75rem; --text-sm:0.875rem; --text-base:1rem;
  --text-md:1.125rem; --text-lg:1.375rem; --text-xl:1.65rem;
  --text-2xl:2rem; --text-3xl:2.5rem; --text-4xl:3.25rem; --text-5xl:4.75rem;
  --tracking-eyebrow:0.14em;
  /* Spacing */
  --space-1:0.25rem; --space-2:0.5rem; --space-3:0.75rem; --space-4:1rem;
  --space-5:1.5rem; --space-6:2rem; --space-7:2.5rem; --space-8:3rem;
  --space-9:4rem; --space-10:5rem; --space-12:7rem;
  /* Radii */
  --radius-xs:4px; --radius-sm:8px; --radius-md:12px;
  --radius-lg:18px; --radius-xl:26px; --radius-pill:999px;
  /* Shadows */
  --shadow-xs:0 1px 2px rgba(15,29,43,0.06);
  --shadow-sm:0 2px 6px rgba(15,29,43,0.07);
  --shadow-md:0 8px 20px -6px rgba(15,29,43,0.12);
  --shadow-lg:0 18px 44px -12px rgba(15,29,43,0.18);
  --shadow-xl:0 30px 70px -20px rgba(20,34,66,0.28);
  /* Layout */
  --container-sm:640px; --container-md:860px;
  --container-lg:1120px; --container-xl:1320px;
  /* Motion */
  --ease-out:cubic-bezier(0.22,1,0.36,1);
  --dur-fast:140ms; --dur-base:240ms; --dur-slow:420ms;
}

html, body { height: 100%; }
body { background: var(--surface-page); font-family: var(--font-ui); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
#root { min-height: 100%; }
a { text-decoration: none; }
button { font-family: var(--font-ui); cursor: pointer; }
button:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 2px; }
img { display: block; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════════════════════════════════════════════════════
   SUPABASE CONFIG
   Fill these in after running supabase/migrations/001_create_products.sql
   ══════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://asztgumnilpjdxpizkzn.supabase.co';       // e.g. https://xyzxyz.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_eSriyphjQxKP3rNxNwmpOg_w5K1R_1j';  // your project's anon public key

/* ══════════════════════════════════════════════════════════════
   FALLBACK DATA — used when Supabase is not yet configured
   ══════════════════════════════════════════════════════════════ */
const FALLBACK_PACKAGES = [
  { id:'reg12', title:'Umroh Reguler 12 Hari', image:'kaaba',  badge:{label:'Best Seller',variant:'accent'}, duration:'12 Hari', departure:'Jakarta',           hotelStars:4, facilities:['Hotel ⭐4 dekat Masjidil Haram','Pembimbing bersertifikat','Maskapai resmi PP'], price:'Rp 28.900.000', rating:'4.9', unit:'Umrah' },
  { id:'priv9', title:'Umroh Private 9 Hari',  image:'madinah', badge:{label:'VIP',variant:'seal'},          duration:'9 Hari',  departure:'Jakarta · Surabaya', hotelStars:5, facilities:['Hotel ⭐5 view Haram','Muthawif pribadi','Itinerary fleksibel'],             price:'Rp 47.500.000', rating:'5.0', unit:'Umrah' },
  { id:'haji',  title:'Haji Khusus 1447 H',    image:'group',  badge:{label:'Kuota Resmi',variant:'success'}, duration:'26 Hari', departure:'Jakarta',           hotelStars:5, facilities:['Tenda VIP Arafah–Mina','Bimbingan manasik penuh','Kuota PIHK resmi'],        price:'Rp 198.000.000', rating:'4.8', unit:'Haji Khusus' },
  { id:'turki', title:'Wisata Halal Turki',     image:'hero',   badge:{label:'Best Value',variant:'brand'},    duration:'10 Hari', departure:'Jakarta',           hotelStars:4, facilities:['Hotel bintang 4','Tour guide muslim-friendly','Kunjungan masjid bersejarah'], price:'Rp 32.000.000',  rating:'4.7', unit:'Wisata Halal' },
];

const IMG_MAP = {
  kaaba:'/assets/img-kaaba.jpg', madinah:'/assets/img-madinah.jpg',
  group:'/assets/img-group.jpg', arafah:'/assets/img-arafah.jpg',
  hero:'/assets/img-hero-makkah.jpg',
};
const imgSrc = key => (!key || key.includes('/') || key.startsWith('http')) ? (key || IMG_MAP.kaaba) : (IMG_MAP[key] || IMG_MAP.kaaba);

function normalizeProduct(row) {
  return {
    id: row.id, title: row.name, image: row.image_key || 'kaaba',
    badge: { label: row.badge_label, variant: row.badge_variant || 'accent' },
    duration: row.duration || '—', departure: row.departure || 'Jakarta',
    hotelStars: row.hotel_stars || 4,
    facilities: Array.isArray(row.facilities) ? row.facilities : [],
    price: row.price_display || '—', rating: row.rating ? String(row.rating) : '4.8',
    unit: row.unit, sold: row.sold || 0, cap: row.cap || 20, tone: row.tone || 'blue',
  };
}

async function fetchProducts() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&is_published=eq.true&order=sort_order.asc`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!res.ok) throw new Error('Supabase error');
  return (await res.json()).map(normalizeProduct);
}

/* ══════════════════════════════════════════════════════════════
   ICON HELPER
   ══════════════════════════════════════════════════════════════ */
function Ico({ name, size=20, color, strokeWidth=1.8 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide || !lucide[name]) return;
    ref.current.innerHTML = '';
    const el = lucide.createElement(lucide[name]);
    ref.current.appendChild(el);
    const s = ref.current.querySelector('svg');
    if (s) { s.setAttribute('width',size); s.setAttribute('height',size); s.setAttribute('stroke-width',strokeWidth); if (color) s.setAttribute('stroke',color); }
  });
  return <span ref={ref} style={{ display:'flex', flexShrink:0 }} />;
}

/* ══════════════════════════════════════════════════════════════
   DESIGN SYSTEM COMPONENTS
   ══════════════════════════════════════════════════════════════ */
function Button({ variant='primary', size='md', onClick, children, fullWidth, style }) {
  const V = {
    primary:   { background:'var(--brand-primary)', color:'#fff', border:'none' },
    secondary: { background:'var(--surface-card)', color:'var(--text-primary)', border:'1.5px solid var(--border-default)' },
    accent:    { background:'var(--gold-300)', color:'var(--indigo-800)', border:'none' },
    seal:      { background:'var(--maroon-500)', color:'#fff', border:'none' },
    ghost:     { background:'transparent', color:'var(--text-secondary)', border:'1.5px solid var(--border-subtle)' },
  };
  const S = { sm:{ padding:'7px 16px', fontSize:'0.8125rem' }, md:{ padding:'10px 20px', fontSize:'0.875rem' }, lg:{ padding:'13px 28px', fontSize:'1rem' } };
  return <button onClick={onClick} style={{ fontFamily:'var(--font-ui)', fontWeight:600, borderRadius:'var(--radius-pill)', cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6, transition:'all var(--dur-base) var(--ease-out)', width:fullWidth?'100%':'auto', ...V[variant], ...S[size], ...style }}>{children}</button>;
}

function Badge({ variant='accent', soft=true, children }) {
  const M = {
    accent:  soft ? ['var(--gold-50)','var(--gold-600)']    : ['var(--gold-300)','var(--indigo-800)'],
    seal:    soft ? ['var(--maroon-100)','var(--maroon-600)'] : ['var(--maroon-500)','#fff'],
    success: soft ? ['var(--success-50)','var(--success-500)'] : ['var(--success-500)','#fff'],
    brand:   soft ? ['var(--blue-50)','var(--blue-700)']    : ['var(--brand-primary)','#fff'],
  };
  const [bg,fg] = M[variant] || M.accent;
  return <span style={{ display:'inline-block', padding:'4px 11px', borderRadius:'var(--radius-pill)', background:bg, color:fg, fontSize:12, fontWeight:700, whiteSpace:'nowrap', letterSpacing:'0.02em' }}>{children}</span>;
}

function SectionHeading({ eyebrow, title, subtitle, align='left', onDark }) {
  return (
    <div style={{ textAlign:align }}>
      {eyebrow && <div style={{ fontFamily:'var(--font-ui)', fontSize:'0.75rem', fontWeight:700, letterSpacing:'var(--tracking-eyebrow)', textTransform:'uppercase', color:onDark?'var(--gold-300)':'var(--brand-primary)', marginBottom:10 }}>{eyebrow}</div>}
      <h2 style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'var(--text-3xl)', lineHeight:1.1, color:onDark?'#fff':'var(--text-primary)', margin:0 }}>{title}</h2>
      {subtitle && <p style={{ fontFamily:'var(--font-body)', fontSize:'var(--text-base)', lineHeight:1.75, color:onDark?'rgba(255,255,255,0.8)':'var(--text-secondary)', margin:'12px 0 0' }}>{subtitle}</p>}
    </div>
  );
}

function StatBlock({ value, label, onDark }) {
  return (
    <div>
      <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'var(--text-2xl)', color:onDark?'#fff':'var(--text-primary)', lineHeight:1 }}>{value}</div>
      <div style={{ fontFamily:'var(--font-ui)', fontSize:'0.8125rem', color:onDark?'rgba(255,255,255,0.75)':'var(--text-secondary)', marginTop:4 }}>{label}</div>
    </div>
  );
}

function Card({ elevation='sm', padding='md', goldTop, interactive, children, style }) {
  const shadows = { sm:'var(--shadow-sm)', md:'var(--shadow-md)', lg:'var(--shadow-lg)' };
  const pads    = { sm:16, md:20, lg:28 };
  return (
    <div
      style={{ background:'var(--surface-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', boxShadow:shadows[elevation]||shadows.sm, padding:pads[padding]||pads.md, borderTop:goldTop?'3px solid var(--gold-300)':undefined, cursor:interactive?'pointer':undefined, transition:interactive?'box-shadow var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out)':undefined, ...style }}
      onMouseEnter={interactive?e=>{e.currentTarget.style.boxShadow='var(--shadow-md)';e.currentTarget.style.transform='translateY(-2px)';}:undefined}
      onMouseLeave={interactive?e=>{e.currentTarget.style.boxShadow=shadows[elevation]||shadows.sm;e.currentTarget.style.transform='none';}:undefined}
    >{children}</div>
  );
}

function Input({ label, placeholder, hint, type='text' }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      {label && <label style={{ fontFamily:'var(--font-ui)', fontSize:'0.8125rem', fontWeight:600, color:'var(--text-primary)' }}>{label}</label>}
      <input type={type} placeholder={placeholder} style={{ fontFamily:'var(--font-ui)', fontSize:'0.875rem', padding:'10px 14px', border:'1.5px solid var(--border-default)', borderRadius:'var(--radius-sm)', background:'var(--surface-card)', color:'var(--text-primary)', outline:'none', width:'100%' }}
        onFocus={e=>e.target.style.borderColor='var(--brand-primary)'} onBlur={e=>e.target.style.borderColor='var(--border-default)'}
      />
      {hint && <span style={{ fontFamily:'var(--font-ui)', fontSize:'0.75rem', color:'var(--text-muted)' }}>{hint}</span>}
    </div>
  );
}

function PackageCard({ title, image, badge, duration, departure, hotelStars, facilities, price, rating, onSelect }) {
  return (
    <div onClick={onSelect} style={{ background:'var(--surface-card)', borderRadius:'var(--radius-xl)', overflow:'hidden', border:'1px solid var(--border-subtle)', boxShadow:'var(--shadow-sm)', cursor:'pointer', transition:'transform var(--dur-base) var(--ease-out),box-shadow var(--dur-base) var(--ease-out)', display:'flex', flexDirection:'column' }}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='var(--shadow-lg)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='var(--shadow-sm)';}}>
      <div style={{ position:'relative', height:200, overflow:'hidden', flexShrink:0 }}>
        <img src={imgSrc(image)} alt={title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(180deg,transparent 50%,rgba(15,29,43,0.35) 100%)' }} />
        {badge?.label && <span style={{ position:'absolute', top:12, left:12 }}><Badge variant={badge.variant||'accent'} soft={false}>{badge.label}</Badge></span>}
      </div>
      <div style={{ padding:20, display:'flex', flexDirection:'column', gap:10, flex:1 }}>
        <h3 style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.1rem', margin:0, color:'var(--text-primary)', lineHeight:1.25 }}>{title}</h3>
        <div style={{ display:'flex', gap:14, fontFamily:'var(--font-ui)', fontSize:'0.8rem', color:'var(--text-muted)', flexWrap:'wrap' }}>
          <span>🕒 {duration}</span><span>✈ {departure}</span>
          <span style={{ color:'var(--gold-400)' }}>{'★'.repeat(hotelStars)}</span>
        </div>
        <ul style={{ listStyle:'none', margin:0, padding:0, display:'flex', flexDirection:'column', gap:5, flex:1 }}>
          {(facilities||[]).slice(0,3).map((f,i)=>(
            <li key={i} style={{ fontFamily:'var(--font-body)', fontSize:'0.8125rem', color:'var(--text-secondary)', display:'flex', gap:7, alignItems:'flex-start' }}>
              <span style={{ color:'var(--success-500)', marginTop:1, flexShrink:0 }}>✓</span>{f}
            </li>
          ))}
        </ul>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:12, borderTop:'1px solid var(--border-subtle)', marginTop:'auto' }}>
          <div>
            <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.2rem', color:'var(--brand-seal)', lineHeight:1 }}>{price}</div>
            <div style={{ fontFamily:'var(--font-ui)', fontSize:'0.75rem', color:'var(--text-muted)', marginTop:3 }}>★ {rating} · per jamaah</div>
          </div>
          <button onClick={e=>{e.stopPropagation();onSelect&&onSelect();}} style={{ background:'var(--brand-primary)', color:'#fff', border:'none', padding:'9px 16px', borderRadius:'var(--radius-pill)', fontFamily:'var(--font-ui)', fontWeight:600, fontSize:'0.8rem', cursor:'pointer' }}>Lihat Detail</button>
        </div>
      </div>
    </div>
  );
}

function PricingTier({ price, usd, occupancy, featured }) {
  return (
    <div style={{ textAlign:'center', padding:'20px 14px', borderRadius:'var(--radius-lg)', background:featured?'var(--brand-primary)':'var(--surface-sunken)', border:'1.5px solid', borderColor:featured?'var(--brand-primary)':'var(--border-subtle)', color:featured?'#fff':'var(--text-primary)', transform:featured?'scale(1.07)':'none', boxShadow:featured?'var(--shadow-md)':'none' }}>
      <div style={{ fontFamily:'var(--font-ui)', fontSize:'0.7rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:featured?'rgba(255,255,255,0.75)':'var(--text-muted)', marginBottom:10 }}>{occupancy}</div>
      <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.5rem', lineHeight:1 }}>Rp {price} Jt</div>
      <div style={{ fontFamily:'var(--font-ui)', fontSize:'0.8125rem', color:featured?'rgba(255,255,255,0.8)':'var(--text-secondary)', marginTop:5 }}>{usd}</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   CHROME — HEADER & FOOTER
   ══════════════════════════════════════════════════════════════ */
function SiteHeader({ onNav, active }) {
  const links = [['Beranda','home'],['Haji Khusus','hajj'],['Paket Umroh','packages'],['Layanan & B2B','layanan'],['Kontak','contact']];
  return (
    <header style={{ position:'sticky', top:0, zIndex:50, background:'rgba(255,255,255,0.9)', backdropFilter:'blur(14px)', WebkitBackdropFilter:'blur(14px)', borderBottom:'1px solid var(--border-subtle)', boxShadow:'var(--shadow-xs)' }}>
      <div style={{ maxWidth:'var(--container-xl)', margin:'0 auto', padding:'0 var(--space-6)', height:74, display:'flex', alignItems:'center', gap:'var(--space-5)' }}>
        <a onClick={()=>onNav('home')} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
          <img src="/assets/mark-globe.png" alt="Aqobah" style={{ height:40 }} />
          <span style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.5rem', color:'var(--brand-primary)', letterSpacing:'0.01em' }}>AQOBAH</span>
        </a>
        <nav style={{ display:'flex', gap:4, marginLeft:'var(--space-5)', flex:1 }}>
          {links.map(([label,key])=>(
            <a key={key} onClick={()=>onNav(key)} style={{ fontFamily:'var(--font-ui)', fontSize:'var(--text-sm)', fontWeight:active===key?600:500, color:active===key?'var(--brand-primary)':'var(--text-secondary)', cursor:'pointer', padding:'8px 14px', borderRadius:'var(--radius-pill)', background:active===key?'var(--surface-brand-soft)':'transparent', transition:'all var(--dur-base) var(--ease-out)' }}>{label}</a>
          ))}
        </nav>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <span style={{ fontFamily:'var(--font-ui)', fontSize:'var(--text-sm)', fontWeight:600, color:'var(--text-secondary)', whiteSpace:'nowrap' }}>+62 811-1805-330</span>
          <Button variant="primary" size="sm" onClick={()=>onNav('contact')}>Konsultasi Gratis</Button>
        </div>
      </div>
    </header>
  );
}

function SiteFooter({ onNav }) {
  const cols = [
    ['Layanan',    ['Umroh Reguler','Umroh Private','Haji Khusus','Provider Visa']],
    ['Perusahaan', ['Tentang Kami','Legalitas & Izin','Mitra & Cabang','Karier']],
    ['Bantuan',    ['Hubungi Kami','Pertanyaan Umum','Jadwal Keberangkatan','Panduan Manasik']],
  ];
  return (
    <footer style={{ background:'var(--surface-deep)', color:'rgba(255,255,255,0.82)', marginTop:'var(--space-12)' }}>
      <div style={{ maxWidth:'var(--container-xl)', margin:'0 auto', padding:'var(--space-9) var(--space-6) var(--space-6)' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr 1fr 1fr', gap:'var(--space-7)' }}>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
              <img src="/assets/mark-globe.png" alt="Aqobah" style={{ height:38 }} />
              <span style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'1.4rem', color:'#fff' }}>AQOBAH</span>
            </div>
            <p style={{ fontFamily:'var(--font-body)', fontSize:'var(--text-sm)', lineHeight:1.75, maxWidth:'34ch', margin:'0 0 16px', color:'rgba(255,255,255,0.75)' }}>Penyelenggara Ibadah Haji Khusus &amp; Umrah. Santun &amp; Amanah sejak 2011 — Akreditasi A.</p>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {['PIHK 610','PPIU 579'].map(t=>(<span key={t} style={{ fontFamily:'var(--font-ui)', fontSize:11, fontWeight:600, padding:'5px 11px', borderRadius:'var(--radius-pill)', background:'rgba(255,255,255,0.1)' }}>{t}</span>))}

/* ══════════════════════════════════════════════════════════════
   APP ROOT
   ══════════════════════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('home');
  const [pkg, setPkg] = useState(null);
  const nav = k => { window.scrollTo(0,0); if (k==='packages') { setScreen('home'); return; } setScreen(k); };
  const selectPkg = p => { window.scrollTo(0,0); setPkg(p); setScreen('detail'); };
  const active = screen==='detail' ? 'packages' : screen;
  let body;
  if      (screen==='detail')  body = <PackageDetail pkg={pkg} onNav={nav} />;
  else if (screen==='hajj')    body = <HajiKhususScreen onNav={nav} />;
  else if (screen==='layanan') body = <LayananScreen onNav={nav} />;
  else if (screen==='contact') body = <ContactScreen onNav={nav} />;
  else                         body = <HomeScreen onNav={nav} onSelectPackage={selectPkg} />;
  return (
    <div>
      <SiteHeader onNav={nav} active={active} />
      {body}
      <SiteFooter onNav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
